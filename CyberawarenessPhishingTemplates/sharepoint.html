<style type="text/css">body {
        margin: 0;

    .header {

    }

    .header h1 {

    .content {

        color: #323130;
    }

    .doc-box {
        display: block; 
        border: 1px solid #d2d2d2;
        margin: 20px auto;
        padding: 10px;
        width: 90%;
        background: #fff;
        text-align: center; 
    }

    .doc-box img {
        display: inline-block; 
        width: 32px;
        max-width: 100%;
        height: auto;
        margin-right: 10px;
        vertical-align: middle;
    }

    .doc-box span {
        display: inline-block; 
        font-size: 16px;
        color: #323130;
        vertical-align: middle;
    }

    .buttons {
        margin: 20px 0 40px;
        text-align: center; 
    }

    .btn {
        display: inline-block;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 4px;
        font-size: 16px;
        text-decoration: none;
        width: 160px; 
        max-width: 100%;
        box-sizing: border-box;
    }

    .btn-primary {
        background: #005A9E;
        color: #fff;
    }

    .btn-outline {
        border: 1px solid #106ebe;
        color: #106ebe;
        background: #fff;

    .footer {
        font-size: 12px;
        color: #323130;
        padding: 10px 20px;
        background: #f8f8f8;
        text-align: center;
    }

   
    @media (max-width: 480px) { 
        body {
            padding: 16px;
        }

        .container {
            padding-top: 5px;
        }

        .header h1 {
            font-size: 18px;
        }

        .content {
            padding: 20px 10px; 
        }

        
        .btn {
            width: 45%;
            max-width: 160px;
            margin: 5px 2%; 
            display: inline-block; 
        }

        .buttons {
            margin-top: 30px; 
            margin-bottom: 30px;
        }

        .footer {
            padding-top: 20px; 
            padding-bottom: 20px;
        }
    }

    
    @media (prefers-color-scheme: dark) {
        body { background-color: #1e1e1e; }
        .container { background: #2c2c2c; border-color: #444; }
        .header h1, .content, .doc-box span, .footer { color: #e6e6e6; }
        .doc-box { background: #333; border-color: #555; }
        .btn-primary { background: #3388ff; }
        .btn-outline { border-color: #66aaff; color: #66aaff; background: transparent; }
    }
</style>
